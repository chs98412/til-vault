<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Authentication vs Authorization</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:720px;margin:0 auto;padding:20px;color:#1a1a1a;background:#fff}h2{font-size:18px;font-weight:600;margin:0 0 16px}.tabs{display:flex;gap:0;margin:0 0 16px;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}.tab{flex:1;padding:10px 8px;font-size:12px;text-align:center;cursor:pointer;background:#fff;color:#666;border:none}.tab.active{font-weight:600}.tab.t0.active{background:#EEEDFE;color:#3C3489}.tab.t1.active{background:#E1F5EE;color:#085041}.tab.t2.active{background:#FAEEDA;color:#633806}.scene{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 0 16px}.card{border:1px solid #e5e5e5;border-radius:12px;padding:14px}.card.c-an{border-color:#534AB7;border-width:2px}.card.c-az{border-color:#0F6E56;border-width:2px}.card.dim{opacity:.35}.card-label{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block;margin:0 0 8px}.l-an{background:#EEEDFE;color:#3C3489}.l-az{background:#E1F5EE;color:#085041}.card-q{font-size:14px;font-weight:600;margin:0 0 6px}.card-a{font-size:13px;color:#555;line-height:1.6}.code{font-family:monospace;font-size:11px;padding:1px 5px;border-radius:3px;background:#f5f5f5}.full-card{border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin:0 0 16px}.full-card.active{border-color:#185FA5;background:#E6F1FB}.fc-title{font-size:13px;font-weight:600;margin:0 0 6px}.fc-body{font-size:13px;color:#555;line-height:1.7}.fc-body b{font-weight:600}.msg-area{border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin:0 0 14px}.msg-desc{font-size:13px;line-height:1.7;color:#555}.msg-desc b{font-weight:600}.controls{display:flex;align-items:center;gap:12px}.step-pills{display:flex;gap:6px;flex:1}.pill{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#999;cursor:pointer;background:#fff}.pill.pp{background:#EEEDFE;color:#3C3489;border-color:#534AB7}.pill.pg{background:#E1F5EE;color:#085041;border-color:#0F6E56}.pill.pa{background:#FAEEDA;color:#633806;border-color:#BA7517}.pill.cur{font-weight:700}button{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px}button:disabled{opacity:.3}
</style></head><body>
<h2>Authentication vs Authorization</h2>
<div class="tabs"><div class="tab t0 active" onclick="sw(0)">Concept</div><div class="tab t1" onclick="sw(1)">OAuth2 = authz only</div><div class="tab t2" onclick="sw(2)">OIDC = authn + authz</div></div>
<div id="content"></div>
<div class="msg-area" id="msg"></div>
<div class="controls"><div class="step-pills" id="pills"></div><button id="pb" onclick="g(-1)">Prev</button><button id="nb" onclick="g(1)">Next</button></div>
<script>
const A=[
[[`<div class="scene"><div class="card c-an"><div class="card-label l-an">Authentication (인증)</div><div class="card-q">"you are who?"</div><div class="card-a">이 사람이 누구인지 확인하는 것<br><br>예: 신분증 확인, 로그인, 지문 인식</div></div><div class="card c-az"><div class="card-label l-az">Authorization (인가)</div><div class="card-q">"you can do what?"</div><div class="card-a">이 사람이 무엇을 할 수 있는지 결정하는 것<br><br>예: 사진 읽기 권한, 관리자 권한, 가격 수정 권한</div></div></div>`,`인증은 <b>"너 누구야?"</b>, 인가는 <b>"너 뭐 할 수 있어?"</b>. 인증이 먼저, 인가가 그 다음.`,"pp"],
[`<div class="scene"><div class="card c-an"><div class="card-label l-an">Authentication</div><div class="card-q">실무 예시</div><div class="card-a">Keycloak 로그인 화면에서<br>ID/PW 입력 → "이 사람은 혁순이다"<br><br>결과물: <span class="code">ID token</span> (OIDC)<br>또는: 세션 생성 (session 방식)</div></div><div class="card c-az"><div class="card-label l-az">Authorization</div><div class="card-q">실무 예시</div><div class="card-a">혁순은 ADMIN role이니까<br>상품 가격 수정 API 호출 가능<br><br>결과물: <span class="code">access token</span> (OAuth2)<br>scope/role에 따라 허용/거부</div></div></div>`,`혁순이 백오피스에 로그인하면:<br>1. <b>인증</b>: Keycloak이 "이 사람은 혁순" 확인 → ID token<br>2. <b>인가</b>: "혁순은 ADMIN이니까 상품 관리 가능" → access token에 role 포함`,"pp"]],
[[`<div class="scene"><div class="card dim"><div class="card-label l-an">Authentication</div><div class="card-q">이 사람이 누구인지?</div><div class="card-a">OAuth2는 이 질문에 답하지 않음</div></div><div class="card c-az"><div class="card-label l-az">Authorization</div><div class="card-q">이 앱이 사진을 읽어도 되는지?</div><div class="card-a">OAuth2가 답하는 질문!<br><br>결과: <span class="code">access_token</span><br>scope: <span class="code">photos.readonly</span></div></div></div>`,`OAuth2만 쓰면 "누구의 사진인지는 모르지만, 사진을 읽을 권한은 있다" 상태.`,"pg"],
[`<div class="full-card active"><div class="fc-title">"Google로 로그인"은 어떻게?</div><div class="fc-body">OAuth2만 있던 시절: access token으로 /userinfo API 호출해서 사용자 정보를 억지로 가져옴.<br><br>문제: Google, Facebook, GitHub마다 userinfo API가 다름. 표준이 없어서 각각 구현해야 했음.<br><br><b>→ 이 문제를 해결하기 위해 OIDC가 만들어짐: "인증도 표준화하자!"</b></div></div>`,`OIDC 이전에는 인증을 위해 프로바이더별로 다른 API를 호출해야 했음. OIDC가 ID token으로 이를 표준화.`,"pg"]],
[[`<div class="scene"><div class="card c-an"><div class="card-label l-an">Authentication (OIDC)</div><div class="card-q">이 사람이 누구인지?</div><div class="card-a"><span class="code">ID token</span> (JWT)으로 답함<br><br>sub: "user-1234"<br>name: "혁순"<br>email: "hs@company.com"<br><br>표준화된 형식으로 사용자 정보 제공</div></div><div class="card c-az"><div class="card-label l-az">Authorization (OAuth2)</div><div class="card-q">이 앱이 뭘 할 수 있는지?</div><div class="card-a"><span class="code">access token</span>으로 답함<br><br>scope: photos.readonly<br>또는 role: ADMIN<br><br>API 호출 시 권한 검증에 사용</div></div></div>`,`OIDC = OAuth2 + 인증. <b>ID token</b>: "너 누구야?" (인증). <b>access token</b>: "너 뭐 할 수 있어?" (인가). 두 토큰이 한 번에 발급되지만 용도가 다름.`,"pa"],
[`<div class="full-card active"><div class="fc-title">Keycloak SSO 환경에 대입하면</div><div class="fc-body"><b>1. 사용자가 service-a.com 접속</b><br>→ Keycloak으로 리다이렉트<br><br><b>2. Keycloak에서 로그인 (인증)</b><br>→ "이 사람은 혁순" 확인<br><br><b>3. 토큰 발급</b><br>→ ID token: "혁순, ADMIN, hs@company.com" (인증 정보)<br>→ access token: "scope: backoffice.admin" (인가 정보)<br><br><b>4. service-a.com</b><br>→ ID token으로 사용자 식별 → 자체 세션 쿠키 발급 (인증 결과 활용)<br>→ access token으로 백오피스 API 권한 검증 (인가 결과 활용)</div></div>`,`쿠키 체이닝 → OIDC → 인증/인가 → Keycloak. 전체 그림이 하나로 연결됩니다.`,"pa"]]
];
let sc=0,c=0;
function sw(s){sc=s;c=0;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===s));r();}
function r(){const steps=A[sc],s=steps[c];document.getElementById('content').innerHTML=s[0];document.getElementById('msg').innerHTML=`<div class="msg-desc">${s[1]}</div>`;document.getElementById('pills').innerHTML=steps.map((_,i)=>`<div class="pill ${i<=c?s[2]:''} ${i===c?'cur':''}" onclick="gt(${i})">${i+1}</div>`).join('');document.getElementById('pb').disabled=c===0;document.getElementById('nb').disabled=c===steps.length-1;}
function g(d){c=Math.max(0,Math.min(A[sc].length-1,c+d));r();}function gt(i){c=i;r();}r();
</script></body></html>

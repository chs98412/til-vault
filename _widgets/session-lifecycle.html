<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Session Lifecycle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:720px;margin:0 auto;padding:20px;color:#1a1a1a;background:#fff}h2{font-size:18px;font-weight:600;margin:0 0 16px}.server-box{border:1px solid #e5e5e5;border-radius:12px;padding:16px;margin:0 0 14px}.server-title{font-size:14px;font-weight:600;margin:0 0 10px}.se{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:12px;margin:4px 0;transition:all .3s}.se-active{background:#E1F5EE;border:1px solid #0F6E56}.se-empty{background:#f5f5f5;border:1px solid #e5e5e5;color:#999;font-style:italic}.se-expired{background:#FCEBEB;border:1px solid #A32D2D;text-decoration:line-through;opacity:.6}.se-new{background:#E6F1FB;border:1px solid #185FA5}.se-key{font-family:monospace;font-weight:600;min-width:140px}.se-val{color:#666;flex:1}.se-ttl{font-family:monospace;font-size:11px;min-width:60px;text-align:right}.se-active .se-key{color:#085041}.se-new .se-key{color:#0C447C}.se-expired .se-key{color:#791F1F}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 0 14px}.box{border:1px solid #e5e5e5;border-radius:12px;padding:12px;transition:all .3s}.box.hl{border-color:#185FA5;background:#E6F1FB}.box-title{font-size:13px;font-weight:600;margin:0 0 6px}.box-content{font-size:12px;color:#666}.code{font-family:monospace;font-size:11px;padding:2px 6px;border-radius:4px;background:#f5f5f5}.msg-area{border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin:0 0 14px;min-height:70px}.msg-desc{font-size:13px;line-height:1.7;color:#555}.msg-code{font-family:monospace;font-size:11px;background:#f5f5f5;padding:8px 10px;border-radius:6px;margin:6px 0;display:block;line-height:1.6;white-space:pre-wrap}.controls{display:flex;align-items:center;gap:12px}.step-pills{display:flex;gap:6px;flex:1;flex-wrap:wrap}.pill{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#999;cursor:pointer;background:#fff}.pill.done{background:#E1F5EE;color:#085041;border-color:#0F6E56}.pill.cur{background:#EEEDFE;color:#3C3489;border-color:#534AB7;font-weight:700}button{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px}button:disabled{opacity:.3}
</style></head><body>
<h2>Session Lifecycle (Server Memory)</h2>
<div class="server-box"><div class="server-title">Server memory — session store</div><div id="store"></div></div>
<div class="row"><div class="box" id="reqBox"><div class="box-title">Request</div><div class="box-content" id="reqC"></div></div><div class="box" id="resBox"><div class="box-title">Response</div><div class="box-content" id="resC"></div></div></div>
<div class="msg-area" id="msgA"></div>
<div class="controls"><div class="step-pills" id="pills"></div><button id="pb" onclick="g(-1)">Prev</button><button id="nb" onclick="g(1)">Next</button></div>
<script>
const L=[
{store:[{k:"(empty)",v:"",ttl:"",cls:"se-empty"}],req:"GET /login",rH:true,res:"200 OK",rsH:false,msg:'사용자가 로그인 페이지에 접속. 아직 세션이 없는 상태.'},
{store:[{k:"JSESSIONID=a1b2c3",v:"{ }",ttl:"TTL: 30m",cls:"se-new"}],req:"POST /login (id, pw)",rH:true,res:"Set-Cookie: JSESSIONID=a1b2c3",rsH:true,msg:'로그인 요청. 서버가 세션 ID를 생성하고 메모리에 빈 세션 객체를 만듦.<div class="msg-code">String sessionId = UUID.randomUUID().toString();\nsessionStore.put(sessionId, new HashMap<>());</div>'},
{store:[{k:"JSESSIONID=a1b2c3",v:'{ user: "혁순", role: "ADMIN" }',ttl:"TTL: 30m",cls:"se-active"}],req:"POST /login",rH:false,res:"Set-Cookie: JSESSIONID=a1b2c3",rsH:true,msg:'인증 성공! 세션 객체에 사용자 정보를 저장.<div class="msg-code">session.setAttribute("user", "혁순");\nsession.setAttribute("role", "ADMIN");</div>'},
{store:[{k:"JSESSIONID=a1b2c3",v:'{ user: "혁순", role: "ADMIN" }',ttl:"TTL: 30m ↻",cls:"se-active"}],req:"GET /dashboard\nCookie: JSESSIONID=a1b2c3",rH:true,res:'200 OK ("혁순님의 dashboard")',rsH:true,msg:'이후 요청마다 브라우저가 쿠키를 보냄. 서버는 세션 ID로 저장소를 조회해서 사용자 정보를 가져옴. 요청이 올 때마다 TTL이 30분으로 갱신됨.'},
{store:[{k:"JSESSIONID=a1b2c3",v:'{ user: "혁순", role: "ADMIN" }',ttl:"TTL: 0m",cls:"se-expired"}],req:"(요청 없음 - 30분 경과)",rH:false,res:"",rsH:false,msg:'30분간 요청이 없으면 서버가 세션을 타임아웃 처리. 백그라운드 스레드가 주기적으로 만료된 세션을 정리.'},
{store:[{k:"(empty)",v:"",ttl:"",cls:"se-empty"}],req:"GET /dashboard\nCookie: JSESSIONID=a1b2c3",rH:true,res:"302 Redirect → /login",rsH:true,msg:'세션 만료 후 접속하면, 쿠키는 있지만 서버 저장소에 해당 세션이 없음. 미인증으로 판단하고 로그인 페이지로 리다이렉트.'},
{store:[{k:"JSESSIONID=a1b2c3",v:'{ user: "혁순" }',ttl:"active",cls:"se-active"}],req:"POST /logout\nCookie: JSESSIONID=a1b2c3",rH:true,res:"Set-Cookie: JSESSIONID=; Max-Age=0",rsH:true,msg:'로그아웃. 서버가 세션을 명시적으로 폐기하고, 브라우저 쿠키도 삭제.<div class="msg-code">session.invalidate();\n// 응답: Max-Age=0 → 브라우저 쿠키 삭제</div>'},
{store:[{k:"(empty)",v:"",ttl:"",cls:"se-empty"}],req:"",rH:false,res:"",rsH:false,msg:'세션 제거 완료. 문제: 이 저장소가 서버 메모리에 있다는 건, 서버가 재시작되면 모든 세션이 날아간다는 의미. 서버가 여러 대면 어떻게 될까요?'}
];
let c=0;
function r(){const s=L[c];document.getElementById('store').innerHTML=s.store.map(e=>e.cls==='se-empty'?`<div class="se ${e.cls}">${e.k}</div>`:`<div class="se ${e.cls}"><span class="se-key">${e.k}</span><span class="se-val">${e.v}</span><span class="se-ttl">${e.ttl}</span></div>`).join('');document.getElementById('reqC').innerHTML=s.req?`<span class="code">${s.req.replace(/\n/g,'<br>')}</span>`:'-';document.getElementById('reqBox').className='box'+(s.rH?' hl':'');document.getElementById('resC').innerHTML=s.res?`<span class="code">${s.res}</span>`:'-';document.getElementById('resBox').className='box'+(s.rsH?' hl':'');document.getElementById('msgA').innerHTML=`<div class="msg-desc">${s.msg}</div>`;document.getElementById('pills').innerHTML=L.map((_,i)=>`<div class="pill ${i<c?'done':i===c?'cur':''}" onclick="gt(${i})">${i+1}</div>`).join('');document.getElementById('pb').disabled=c===0;document.getElementById('nb').disabled=c===L.length-1;}
function g(d){c=Math.max(0,Math.min(L.length-1,c+d));r();}function gt(i){c=i;r();}r();
</script></body></html>

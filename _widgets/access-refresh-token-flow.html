<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Access + Refresh Token Flow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:720px;margin:0 auto;padding:20px;color:#1a1a1a;background:#fff}h2{font-size:18px;font-weight:600;margin:0 0 16px}.tabs{display:flex;gap:0;margin:0 0 16px;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}.tab{flex:1;padding:10px 8px;font-size:12px;text-align:center;cursor:pointer;background:#fff;color:#666;border:none}.tab.active{font-weight:600}.tab.t0.active{background:#E1F5EE;color:#085041}.tab.t1.active{background:#FAEEDA;color:#633806}.tab.t2.active{background:#FCEBEB;color:#791F1F}.token-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 0 14px}.tk{border:1px solid #e5e5e5;border-radius:12px;padding:12px;transition:all .3s;min-height:90px}.tk.tk-a{border-color:#534AB7}.tk.tk-r{border-color:#0F6E56}.tk.expired{opacity:.4;border-style:dashed}.tk.revoked{opacity:.4;border-color:#A32D2D;background:#FCEBEB;text-decoration:line-through}.tk.stolen{border-color:#A32D2D;background:#FCEBEB}.tk.active{border-width:2px}.tk-title{font-size:12px;font-weight:600;margin:0 0 4px}.c-a{color:#534AB7}.c-r{color:#0F6E56}.c-x{color:#A32D2D}.tk-props{font-size:11px;font-family:monospace;color:#666;line-height:1.6;white-space:pre-wrap}.infra{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:0 0 14px}.ibox{border:1px solid #e5e5e5;border-radius:12px;padding:10px;transition:all .3s}.ibox.active{border-color:#185FA5;background:#E6F1FB}.ibox-title{font-size:12px;font-weight:600;margin:0 0 4px}.ibox-content{font-size:11px;color:#666;line-height:1.5}.msg-area{border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin:0 0 14px;min-height:50px}.msg-desc{font-size:13px;line-height:1.7;color:#555}.msg-desc b{font-weight:600}.controls{display:flex;align-items:center;gap:12px}.step-pills{display:flex;gap:6px;flex:1;flex-wrap:wrap}.pill{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#999;cursor:pointer;background:#fff}.pill.pg{background:#E1F5EE;color:#085041;border-color:#0F6E56}.pill.pa{background:#FAEEDA;color:#633806;border-color:#BA7517}.pill.pr{background:#FCEBEB;color:#791F1F;border-color:#A32D2D}.pill.cur{font-weight:700}button{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px}button:disabled{opacity:.3}
</style></head><body>
<h2>Access + Refresh Token Flow</h2>
<div class="tabs"><div class="tab t0 active" onclick="sw(0)">Normal flow</div><div class="tab t1" onclick="sw(1)">Token expired → refresh</div><div class="tab t2" onclick="sw(2)">Token stolen + revoke</div></div>
<div class="token-row"><div class="tk" id="tkA"><div class="tk-title c-a" id="tkAT"></div><div class="tk-props" id="tkAP"></div></div><div class="tk" id="tkR"><div class="tk-title c-r" id="tkRT"></div><div class="tk-props" id="tkRP"></div></div></div>
<div class="infra"><div class="ibox" id="ib-c"><div class="ibox-title">Browser</div><div class="ibox-content" id="ibCC"></div></div><div class="ibox" id="ib-s"><div class="ibox-title">API server</div><div class="ibox-content" id="ibSC"></div></div><div class="ibox" id="ib-r"><div class="ibox-title">Redis</div><div class="ibox-content" id="ibRC"></div></div></div>
<div class="msg-area" id="msg"></div>
<div class="controls"><div class="step-pills" id="pills"></div><button id="pb" onclick="g(-1)">Prev</button><button id="nb" onclick="g(1)">Next</button></div>
<script>
const T=[
[[{tAc:"tk-a active",tAt:"Access token (JWT)",tAp:"TTL: 15min\nuser: 혁순\nstateless",tRc:"tk-r active",tRt:"Refresh token",tRp:"TTL: 7days\nRedis에 저장됨",cC:"",cA:false,sC:"",sA:false,rC:"rf_8x2k... → userId: 혁순",rA:true,msg:"로그인 시 두 토큰이 발급됨. <b>Access token</b>: JWT, 15분, stateless. <b>Refresh token</b>: Redis에 저장, 7일.",pc:"pg"},{tAc:"tk-a active",tAt:"Access token",tAp:"Authorization: Bearer eyJ...",tRc:"tk-r",tRt:"Refresh token",tRp:"(보관 중)",cC:"Authorization:\nBearer eyJ...",cA:true,sC:"서명 검증만으로 인증\nRedis 조회 없음!",sA:true,rC:"(조회 없음)",rA:false,msg:"일반 API 요청 시 <b>Access token만</b> 사용. 서버는 JWT 서명 검증(CPU 연산)만 하고 Redis를 안 찔러요. 15분간 Redis 부하 제로!",pc:"pg"}],
[{tAc:"tk-a expired",tAt:"Access token (EXPIRED)",tAp:"TTL: 0min ← 만료!\nuser: 혁순",tRc:"tk-r active",tRt:"Refresh token",tRp:"TTL: 6d 23h 남음",cC:"Access token으로 API 요청",cA:true,sC:"exp 확인 → 만료!\n401 Unauthorized",sA:true,rC:"rf_8x2k... 유효",rA:false,msg:"15분 지나서 Access token 만료. 서버가 401 응답. 다시 로그인해야 할까요? 아니요!",pc:"pa"},{tAc:"tk-a expired",tAt:"Access token (EXPIRED)",tAp:"(만료됨)",tRc:"tk-r active",tRt:"Refresh token",tRp:"POST /auth/refresh\nrf_8x2k...",cC:"POST /auth/refresh\nbody: rf_8x2k...",cA:true,sC:"Redis에서 refresh token 조회",sA:true,rC:"rf_8x2k... 확인 → 유효!",rA:true,msg:"클라이언트가 Refresh token을 서버에 보냄. 서버가 <b>Redis에서 유효성 확인</b>. 이 시점에만 Redis를 조회해요.",pc:"pa"},{tAc:"tk-a active",tAt:"Access token (NEW!)",tAp:"TTL: 15min (fresh!)\nuser: 혁순",tRc:"tk-r active",tRt:"Refresh token (NEW!)",tRp:"rf_new9... (rotated)\n기존 rf_8x2k 삭제",cC:"새 Access token!\n다시 15분",cA:true,sC:"새 Access + Refresh 발급\nrotation!",sA:true,rC:"rf_8x2k 삭제\nrf_new9 저장",rA:true,msg:"새 Access token + 새 Refresh token 발급 (rotation). 기존 Refresh token은 Redis에서 삭제. 로그인 없이 자연스럽게 연장!",pc:"pa"}],
[{tAc:"tk-a stolen",tAt:"Access token (stolen!)",tAp:"TTL: 12min 남음\n공격자가 복사",tRc:"tk-r stolen",tRt:"Refresh token (stolen!)",tRp:"rf_8x2k...\n공격자가 복사",cC:"",cA:false,sC:"",sA:false,rC:"rf_8x2k... 유효",rA:false,msg:"공격자가 XSS로 두 토큰을 모두 탈취. Access token은 12분 남았고 Refresh token은 7일 남음.",pc:"pr"},{tAc:"tk-a stolen",tAt:"Access token (stolen)",tAp:"12분간 사용 가능\n(막을 수 없음)",tRc:"tk-r",tRt:"Refresh token",tRp:"",cC:"",cA:false,sC:"Access token은\n서명 유효 → 수용",sA:true,rC:"",rA:false,msg:"Access token은 stateless라 강제 무효화 불가. <b>하지만 TTL이 15분이라 피해 창이 짧음</b>. 24시간이었으면 24시간 동안 활동 가능했을 것.",pc:"pr"},{tAc:"tk-a expired",tAt:"Access token (expired)",tAp:"만료됨",tRc:"tk-r stolen",tRt:"Refresh token (stolen)",tRp:"공격자: 새 access token\n발급 시도!",cC:"공격자:\nPOST /auth/refresh\nbody: rf_8x2k...",cA:false,sC:"Redis 조회 중...",sA:true,rC:"rf_8x2k... 확인 중",rA:true,msg:"Access 만료 후 공격자가 Refresh token으로 새 Access token을 발급받으려 함.",pc:"pr"},{tAc:"tk-a",tAt:"",tAp:"",tRc:"tk-r revoked",tRt:"Refresh token (REVOKED!)",tRp:"rf_8x2k → 이미 사용됨!\nreuse detection!",cC:"",cA:false,sC:"이미 rotate된 token!\n→ 탈취 감지!\n→ 전체 무효화",sA:true,rC:"REUSE DETECTED\n모든 token 무효화!",rA:true,msg:"정상 사용자가 먼저 rotation을 거쳤다면, 공격자의 기존 Refresh token은 '이미 사용됨'. <b>Reuse detection</b> 발동 → 전체 토큰 무효화. 사용자가 다시 로그인하면 안전한 토큰으로 갱신.",pc:"pr"}]
];
let sc=0,c=0;
function sw(s){sc=s;c=0;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===s));r();}
function r(){const steps=T[sc],s=steps[c];document.getElementById('tkA').className='tk '+s.tAc;document.getElementById('tkAT').textContent=s.tAt;document.getElementById('tkAP').textContent=s.tAp;document.getElementById('tkR').className='tk '+s.tRc;document.getElementById('tkRT').textContent=s.tRt;document.getElementById('tkRP').textContent=s.tRp;document.getElementById('ib-c').className='ibox'+(s.cA?' active':'');document.getElementById('ibCC').innerHTML=s.cC.replace(/\n/g,'<br>')||'-';document.getElementById('ib-s').className='ibox'+(s.sA?' active':'');document.getElementById('ibSC').innerHTML=s.sC.replace(/\n/g,'<br>')||'-';document.getElementById('ib-r').className='ibox'+(s.rA?' active':'');document.getElementById('ibRC').innerHTML=s.rC||'-';document.getElementById('msg').innerHTML=`<div class="msg-desc">${s.msg}</div>`;document.getElementById('pills').innerHTML=steps.map((_,i)=>`<div class="pill ${i<=c?s.pc:''} ${i===c?'cur':''}" onclick="gt(${i})">${i+1}</div>`).join('');document.getElementById('pb').disabled=c===0;document.getElementById('nb').disabled=c===steps.length-1;}
function g(d){c=Math.max(0,Math.min(T[sc].length-1,c+d));r();}function gt(i){c=i;r();}r();
</script></body></html>

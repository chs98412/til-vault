<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SameSite=None Cookie Problem</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:720px;margin:0 auto;padding:20px;color:#1a1a1a;background:#fff}h2{font-size:18px;font-weight:600;margin:0 0 16px}.tabs{display:flex;gap:0;margin:0 0 16px;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}.tab{flex:1;padding:10px 6px;font-size:11px;text-align:center;cursor:pointer;background:#fff;color:#666;border:none}.tab.active{font-weight:600}.tab.t0.active{background:#FCEBEB;color:#791F1F}.tab.t1.active{background:#FAEEDA;color:#633806}.tab.t2.active{background:#E6F1FB;color:#0C447C}.actors{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:0 0 14px}.actor{border:1px solid #e5e5e5;border-radius:12px;padding:12px;min-height:135px;transition:all .3s}.actor.active{border-color:#185FA5;background:#E6F1FB}.actor.problem{border-color:#A32D2D;background:#FCEBEB}.actor-name{font-size:13px;font-weight:600;margin:0 0 2px}.actor-domain{font-size:11px;font-family:monospace;color:#666;margin:0 0 8px}.cookie-label{font-size:11px;color:#999;margin:0 0 4px}.cookie{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-family:monospace;margin:2px 0}.ck-bank{background:#EEEDFE;color:#3C3489}.ck-none{color:#999;font-style:italic;font-family:inherit}.ck-blocked{background:#FCEBEB;color:#791F1F;text-decoration:line-through}.thought{font-size:11px;margin-top:6px;padding:6px 8px;border-radius:6px;background:#f5f5f5;color:#666;line-height:1.5}.msg-area{border:1px solid #e5e5e5;border-radius:12px;padding:16px;margin:0 0 14px;min-height:80px}.msg-desc{font-size:13px;color:#555;line-height:1.6}.msg-desc.warn{color:#A32D2D;font-weight:500}.controls{display:flex;align-items:center;gap:12px}.step-pills{display:flex;gap:6px;flex:1;flex-wrap:wrap}.pill{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#999;cursor:pointer;background:#fff}.pill.pr{background:#FCEBEB;color:#791F1F;border-color:#A32D2D}.pill.pa{background:#FAEEDA;color:#633806;border-color:#BA7517}.pill.pb{background:#E6F1FB;color:#0C447C;border-color:#185FA5}.pill.cur{font-weight:700}button{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px}button:disabled{opacity:.3}
</style></head><body>
<h2>SameSite=None Cookie Problems</h2>
<div class="tabs"><div class="tab t0 active" onclick="sw(0)">A: Chrome (no self-session)</div><div class="tab t1" onclick="sw(1)">B: Safari (3rd party blocked)</div><div class="tab t2" onclick="sw(2)">C: Page navigation</div></div>
<div class="actors">
<div class="actor" id="b-browser"><div class="actor-name">Browser</div><div class="actor-domain" id="bLabel">Chrome</div><div class="cookie-label">cookie jar:</div><div id="cb2"></div><div class="thought" id="bt"></div></div>
<div class="actor" id="b-service"><div class="actor-name">service-a.com</div><div class="actor-domain">service</div><div class="cookie-label">received:</div><div id="cs2"></div><div class="thought" id="st"></div></div>
<div class="actor" id="b-auth"><div class="actor-name">auth.company.com</div><div class="actor-domain">SSO</div><div class="cookie-label">received:</div><div id="ca2"></div><div class="thought" id="at"></div></div>
</div>
<div class="msg-area" id="msgA"></div>
<div class="controls"><div class="step-pills" id="pills"></div><button id="pb" onclick="g(-1)">Prev</button><button id="nb" onclick="g(1)">Next</button></div>
<script>
const A=[[{ac:["b-browser","b-service"],pr:[],bc:[{n:"AUTH_SESSION=abc123",t:"ck-bank",d:"auth.company.com"}],sc:[],ac2:[],bt:"은행에 로그인된 상태",st:"",at:"사용자 인증 확인됨",msg:"사용자가 auth.company.com에 로그인된 상태. SameSite=None으로 쿠키 설정.",w:false},{ac:["b-browser","b-service"],pr:[],bc:[{n:"AUTH_SESSION=abc123",t:"ck-bank",d:"auth.company.com"}],sc:[{n:"없음",t:"ck-none"}],ac2:[],bt:"service-a.com으로 이동",st:"쿠키가 안 왔네... 누구지?",at:"",msg:"service-a.com으로 가는 요청에는 auth.company.com의 쿠키가 안 붙습니다. 쿠키는 요청 대상 도메인의 쿠키만 붙으니까요!",w:true},{ac:["b-browser","b-service","b-auth"],pr:["b-service"],bc:[{n:"AUTH_SESSION=abc123",t:"ck-bank",d:"auth.company.com"}],sc:[],ac2:[{n:"AUTH_SESSION=abc123",t:"ck-bank"}],bt:"",st:"JS로 auth에 물어볼까...",at:"AUTH_SESSION 확인 → OK",msg:"억지 해결: 프론트엔드 JS가 auth.company.com으로 fetch. 이때는 auth 도메인으로 가는 요청이라 쿠키가 붙음.",w:false},{ac:["b-service"],pr:["b-service"],bc:[{n:"AUTH_SESSION=abc123",t:"ck-bank",d:"auth.company.com"}],sc:[],ac2:[],bt:"",st:"매 페이지마다 또 물어봐야 함...",at:"",msg:"문제: 이 방식은 매 페이지 요청마다 auth 서버에 API 호출 필요. 느리고, auth 장애 시 전체 마비.",w:true}],[{ac:["b-browser","b-auth"],pr:[],bc:[{n:"AUTH_SESSION=abc123",t:"ck-bank",d:"auth.company.com"}],sc:[],ac2:[],bt:"Safari / Firefox",st:"",at:"Set-Cookie: SameSite=None; Secure",msg:"Safari/Firefox에서 로그인. auth 도메인에 직접 접속이라 1st party 쿠키로 저장됨.",w:false},{ac:["b-browser","b-service"],pr:["b-browser"],bc:[{n:"AUTH_SESSION=abc123",t:"ck-blocked",d:"auth.company.com"}],sc:[{n:"없음",t:"ck-none"}],ac2:[],bt:"3rd party 쿠키 차단!",st:"",at:"",msg:"service-a.com에서 auth.company.com으로 fetch → 3rd party context! Safari/Firefox가 쿠키 전송 차단!",w:true},{ac:[],pr:["b-browser","b-service","b-auth"],bc:[{n:"AUTH_SESSION=abc123",t:"ck-blocked",d:"auth.company.com"}],sc:[{n:"없음",t:"ck-none"}],ac2:[{n:"차단됨",t:"ck-blocked"}],bt:"",st:"사용자 식별 불가",at:"쿠키가 안 와서 인증 불가",msg:"Safari/Firefox에서는 완전히 작동하지 않습니다. 로그인했는데도 안 된 것처럼 보여요.",w:true}],[{ac:["b-browser","b-service"],pr:[],bc:[{n:"AUTH_SESSION=abc123",t:"ck-bank",d:"auth.company.com"}],sc:[{n:"없음",t:"ck-none"}],ac2:[],bt:"",st:"",at:"",msg:"Chrome에서 JS fetch로 auth에 확인해서 로그인 성공한 상태. 다른 페이지로 이동해볼게요.",w:false},{ac:["b-browser","b-service"],pr:["b-service"],bc:[{n:"AUTH_SESSION=abc123",t:"ck-bank",d:"auth.company.com"}],sc:[{n:"없음",t:"ck-none"}],ac2:[],bt:"GET /settings",st:"또 쿠키가 없네... 또 물어봐야 하나?",at:"",msg:"페이지 이동! service-a.com에 자체 세션이 없으니 또 사용자를 모릅니다.",w:true},{ac:["b-service","b-auth"],pr:["b-auth"],bc:[{n:"AUTH_SESSION=abc123",t:"ck-bank",d:"auth.company.com"}],sc:[],ac2:[],bt:"",st:"auth 서버가 응답을 안 해...",at:"503 Service Unavailable",msg:"auth 서버 장애 시 모든 서비스가 동시에 마비! OIDC였으면 각 서비스가 자체 세션으로 동작하니 기존 세션은 유지됩니다.",w:true}]];
let sc=0,c=0;
function sw(s){sc=s;c=0;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===s));document.getElementById('bLabel').textContent=s===1?'Safari / Firefox':'Chrome';r();}
function r(){const steps=A[sc],s=steps[c];['b-browser','b-service','b-auth'].forEach(id=>{const e=document.getElementById(id);e.classList.remove('active','problem')});s.ac.forEach(id=>document.getElementById(id).classList.add('active'));s.pr.forEach(id=>document.getElementById(id).classList.add('problem'));document.getElementById('cb2').innerHTML=s.bc.length?s.bc.map(x=>`<div class="cookie ${x.t}">${x.n} <span style="font-size:10px;opacity:.7">(${x.d})</span></div>`).join(''):'<div class="cookie ck-none">empty</div>';document.getElementById('cs2').innerHTML=s.sc.length?s.sc.map(x=>x.t==='ck-none'?`<div class="cookie ck-none">${x.n}</div>`:`<div class="cookie ${x.t}">${x.n}</div>`).join(''):'<div class="cookie ck-none">—</div>';document.getElementById('ca2').innerHTML=s.ac2.length?s.ac2.map(x=>x.t==='ck-blocked'?`<div class="cookie ck-blocked">${x.n}</div>`:x.t==='ck-none'?`<div class="cookie ck-none">${x.n}</div>`:`<div class="cookie ${x.t}">${x.n}</div>`).join(''):'<div class="cookie ck-none">—</div>';document.getElementById('bt').textContent=s.bt;document.getElementById('st').textContent=s.st;document.getElementById('at').textContent=s.at;document.getElementById('msgA').innerHTML=`<div class="msg-desc${s.w?' warn':''}">${s.msg}</div>`;const pc=sc===0?'pr':sc===1?'pa':'pb';document.getElementById('pills').innerHTML=steps.map((_,i)=>`<div class="pill ${i<=c?pc:''} ${i===c?'cur':''}" onclick="gt(${i})">${i+1}</div>`).join('');document.getElementById('pb').disabled=c===0;document.getElementById('nb').disabled=c===steps.length-1;}
function g(d){c=Math.max(0,Math.min(A[sc].length-1,c+d));r();}function gt(i){c=i;r();}r();
</script></body></html>

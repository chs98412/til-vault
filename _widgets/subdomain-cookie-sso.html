<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Subdomain Cookie Sharing SSO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:720px;margin:0 auto;padding:20px;color:#1a1a1a;background:#fff}h2{font-size:18px;font-weight:600;margin:0 0 12px}.domain-banner{display:flex;gap:8px;margin:0 0 14px;align-items:center;flex-wrap:wrap;font-size:11px;font-family:monospace}.dtag{padding:4px 10px;border-radius:6px}.dtag.parent{background:#EEEDFE;color:#3C3489}.dtag.child{background:#f5f5f5;color:#666}.actors{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:0 0 14px}.actor{border:1px solid #e5e5e5;border-radius:12px;padding:12px;min-height:130px;transition:all .3s}.actor.active{border-color:#185FA5;background:#E6F1FB}.actor.success{border-color:#0F6E56;background:#E1F5EE}.actor-name{font-size:13px;font-weight:600;margin:0 0 2px}.actor-domain{font-size:11px;font-family:monospace;color:#666;margin:0 0 8px}.cookie-label{font-size:11px;color:#999;margin:0 0 4px}.cookie{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-family:monospace;margin:2px 0;background:#EEEDFE;color:#3C3489}.cookie-none{color:#999;font-style:italic;font-family:inherit;background:none}.thought{font-size:11px;margin-top:6px;padding:6px 8px;border-radius:6px;background:#f5f5f5;color:#666;line-height:1.5}.msg-area{border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin:0 0 14px;min-height:60px}.msg-desc{font-size:13px;color:#555;line-height:1.6}.msg-desc.good{color:#085041;font-weight:500}.controls{display:flex;align-items:center;gap:12px}.step-pills{display:flex;gap:6px;flex:1}.pill{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#999;cursor:pointer;background:#fff}.pill.done{background:#E1F5EE;color:#085041;border-color:#0F6E56}.pill.cur{background:#EEEDFE;color:#3C3489;border-color:#534AB7;font-weight:700}button{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px}button:disabled{opacity:.3}
</style></head><body>
<h2>Subdomain Cookie Sharing SSO</h2>
<div class="domain-banner"><span class="dtag parent">*.company.com</span> : <span class="dtag child">auth.company.com</span><span class="dtag child">a.company.com</span><span class="dtag child">b.company.com</span><span class="dtag child">c.company.com</span></div>
<div class="actors">
<div class="actor" id="c-browser"><div class="actor-name">Browser</div><div class="actor-domain">cookie jar</div><div class="cookie-label">.company.com cookies:</div><div id="cb3"></div><div class="thought" id="bt3"></div></div>
<div class="actor" id="c-current"><div class="actor-name" id="curN">a.company.com</div><div class="actor-domain" id="curS">current service</div><div class="cookie-label">received:</div><div id="cs3"></div><div class="thought" id="st3"></div></div>
<div class="actor" id="c-auth"><div class="actor-name">auth.company.com</div><div class="actor-domain">SSO server</div><div class="cookie-label">received:</div><div id="ca3"></div><div class="thought" id="at3"></div></div>
</div>
<div class="msg-area" id="msgA3"></div>
<div class="controls"><div class="step-pills" id="pills3"></div><button id="pb3" onclick="g(-1)">Prev</button><button id="nb3" onclick="g(1)">Next</button></div>
<script>
const S=[
{sN:"a.company.com",sS:"service A",ac:["c-browser","c-current"],su:[],bc:[],sc:[{n:"없음",t:"none"}],ac2:[],bt:"a.company.com 접속",st:"쿠키가 없네 → 미인증",at:"",msg:"a.company.com에 처음 접속. .company.com 쿠키가 아직 없으니 쿠키 없이 요청.",good:false},
{sN:"auth.company.com",sS:"(redirected)",ac:["c-browser","c-auth"],su:[],bc:[],sc:[],ac2:[],bt:"auth.company.com으로 이동",st:"",at:"로그인 페이지 보여줌",msg:"사용자가 로그인합니다.",good:false},
{sN:"auth.company.com",sS:"(redirected)",ac:["c-auth"],su:[],bc:[{n:"SESSION=abc123",t:"ok",d:".company.com"}],sc:[],ac2:[],bt:"",st:"",at:"Set-Cookie: SESSION=abc123; Domain=.company.com",msg:"auth 서버가 Domain=.company.com으로 쿠키를 설정. 이 쿠키는 *.company.com 전체에서 공유됩니다!",good:false},
{sN:"a.company.com",sS:"service A",ac:["c-browser","c-current"],su:["c-current"],bc:[{n:"SESSION=abc123",t:"ok",d:".company.com"}],sc:[{n:"SESSION=abc123",t:"ok"}],ac2:[],bt:"a.company.com으로 돌아감",st:"SESSION 쿠키 확인 → 인증 완료!",at:"",msg:"a.company.com으로 돌아왔더니 쿠키가 자동으로 붙습니다! .company.com 도메인 쿠키니까.",good:true},
{sN:"a.company.com",sS:"service A",ac:["c-browser","c-current"],su:["c-current"],bc:[{n:"SESSION=abc123",t:"ok",d:".company.com"}],sc:[{n:"SESSION=abc123",t:"ok"}],ac2:[],bt:"페이지 이동",st:"SESSION 쿠키 확인 → OK",at:"",msg:"a.company.com 내에서 페이지를 이동해도 쿠키가 계속 붙습니다. auth 서버에 물어볼 필요 없어요!",good:true},
{sN:"b.company.com",sS:"service B",ac:["c-browser","c-current"],su:["c-current"],bc:[{n:"SESSION=abc123",t:"ok",d:".company.com"}],sc:[{n:"SESSION=abc123",t:"ok"}],ac2:[],bt:"b.company.com으로 이동!",st:"SESSION 쿠키 확인 → 인증 완료!",at:"",msg:"완전히 다른 서비스인 b.company.com으로 이동했는데도 쿠키가 자동으로 붙습니다! 같은 .company.com 하위니까. 추가 인증 없이 바로 사용 가능!",good:true},
{sN:"c.company.com",sS:"service C",ac:["c-browser","c-current"],su:["c-current"],bc:[{n:"SESSION=abc123",t:"ok",d:".company.com"}],sc:[{n:"SESSION=abc123",t:"ok"}],ac2:[],bt:"c.company.com으로 이동!",st:"SESSION 쿠키 확인 → 인증 완료!",at:"",msg:"c.company.com에도 똑같이! 한 번 로그인으로 a, b, c 전부 인증 완료. 이게 쿠키 체이닝이 가능한 경우의 SSO입니다!",good:true}
];
let c=0;
function r(){const s=S[c];document.getElementById('curN').textContent=s.sN;document.getElementById('curS').textContent=s.sS;['c-browser','c-current','c-auth'].forEach(id=>{document.getElementById(id).classList.remove('active','success')});s.ac.forEach(id=>document.getElementById(id).classList.add('active'));s.su.forEach(id=>document.getElementById(id).classList.add('success'));document.getElementById('cb3').innerHTML=s.bc.length?s.bc.map(x=>`<div class="cookie">${x.n} <span style="font-size:10px;opacity:.7">(${x.d})</span></div>`).join(''):'<div class="cookie-none">empty</div>';document.getElementById('cs3').innerHTML=s.sc.length?s.sc.map(x=>x.t==='none'?`<div class="cookie-none">${x.n}</div>`:`<div class="cookie">${x.n}</div>`).join(''):'<div class="cookie-none">—</div>';document.getElementById('ca3').innerHTML=s.ac2.length?s.ac2.map(x=>`<div class="cookie">${x.n}</div>`).join(''):'<div class="cookie-none">—</div>';document.getElementById('bt3').textContent=s.bt;document.getElementById('st3').textContent=s.st;document.getElementById('at3').textContent=s.at;document.getElementById('msgA3').innerHTML=`<div class="msg-desc${s.good?' good':''}">${s.msg}</div>`;document.getElementById('pills3').innerHTML=S.map((_,i)=>`<div class="pill ${i<c?'done':i===c?'cur':''}" onclick="gt(${i})">${i+1}</div>`).join('');document.getElementById('pb3').disabled=c===0;document.getElementById('nb3').disabled=c===S.length-1;}
function g(d){c=Math.max(0,Math.min(S.length-1,c+d));r();}function gt(i){c=i;r();}r();
</script></body></html>

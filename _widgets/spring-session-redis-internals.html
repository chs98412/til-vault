<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Spring Session + Redis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:720px;margin:0 auto;padding:20px;color:#1a1a1a;background:#fff}h2{font-size:18px;font-weight:600;margin:0 0 16px}.arch{display:grid;grid-template-columns:1fr 40px 1fr 40px 1fr;gap:0;align-items:center;margin:0 0 16px}.abox{border:1px solid #e5e5e5;border-radius:12px;padding:12px;transition:all .3s;min-height:110px}.abox.active{border-color:#185FA5;background:#E6F1FB}.abox.active2{border-color:#0F6E56;background:#E1F5EE}.abox-title{font-size:13px;font-weight:600;margin:0 0 4px}.abox-sub{font-size:11px;color:#666;margin:0 0 8px}.abox-content{font-size:11px;font-family:monospace;color:#666;line-height:1.6}.arrow-col{text-align:center;color:#999;font-size:16px}.redis-data{margin:0 0 16px;border:1px solid #e5e5e5;border-radius:12px;padding:12px;transition:all .3s}.redis-data.active{border-color:#0F6E56;background:#E1F5EE}.rd-title{font-size:12px;font-weight:600;margin:0 0 8px}.rd-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px;font-family:monospace}.rd-key{color:#666;padding:3px 6px;background:#f5f5f5;border-radius:4px}.rd-val{padding:3px 6px}.msg-area{border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin:0 0 14px;min-height:60px}.msg-desc{font-size:13px;line-height:1.7;color:#555}.msg-code{font-family:monospace;font-size:11px;background:#f5f5f5;padding:6px 10px;border-radius:6px;margin:6px 0;display:block;line-height:1.6;white-space:pre-wrap}.controls{display:flex;align-items:center;gap:12px}.step-pills{display:flex;gap:6px;flex:1}.pill{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#999;cursor:pointer;background:#fff}.pill.done{background:#E1F5EE;color:#085041;border-color:#0F6E56}.pill.cur{background:#EEEDFE;color:#3C3489;border-color:#534AB7;font-weight:700}button{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px}button:disabled{opacity:.3}
</style></head><body>
<h2>Spring Session + Redis Internals</h2>
<div class="arch">
<div class="abox" id="ar-c"><div class="abox-title">Browser</div><div class="abox-sub">client</div><div class="abox-content" id="arCC"></div></div>
<div class="arrow-col" id="a1">&middot;</div>
<div class="abox" id="ar-s"><div class="abox-title">Spring Boot</div><div class="abox-sub">SessionRepositoryFilter</div><div class="abox-content" id="arSC"></div></div>
<div class="arrow-col" id="a2">&middot;</div>
<div class="abox" id="ar-r"><div class="abox-title">Redis / Valkey</div><div class="abox-sub">session store</div><div class="abox-content" id="arRC"></div></div>
</div>
<div class="redis-data" id="rdBox"><div class="rd-title">Redis data structure (HASH)</div><div id="rdRows"></div></div>
<div class="msg-area" id="msgA"></div>
<div class="controls"><div class="step-pills" id="pills"></div><button id="pb" onclick="g(-1)">Prev</button><button id="nb" onclick="g(1)">Next</button></div>
<script>
const R=[
{cC:"",cA:false,sC:"SessionRepositoryFilter\n가 모든 요청을 가로채는 중",sA:true,rC:"(empty)",rA:false,rd:[],rdA:false,a1:"",a2:"",msg:'@EnableRedisHttpSession으로 SessionRepositoryFilter가 등록. 모든 요청을 가로채서 HttpSession을 Redis 기반 구현체로 교체.<div class="msg-code">@EnableRedisHttpSession\nspring.data.redis.host=valkey.internal\nspring.data.redis.port=6379</div>'},
{cC:"POST /login",cA:true,sC:"authenticate()\n→ session.setAttribute()",sA:true,rC:"",rA:false,rd:[],rdA:false,a1:"→",a2:"",msg:'로그인 요청. 인증 성공 후 Spring Security가 session.setAttribute()를 호출. 내부적으로 RedisIndexedSessionRepository가 동작.'},
{cC:"",cA:false,sC:"RedisIndexed\nSessionRepository\n.createSession()",sA:true,rC:"HMSET\nspring:session:\nsessions:abc123",rA:true,rd:[{k:"spring:session:sessions:abc123",v:""},{k:"sessionAttr:user",v:'"혁순"'},{k:"sessionAttr:role",v:'"ADMIN"'},{k:"maxInactiveInterval",v:"1800"},{k:"lastAccessedTime",v:"1711872000000"}],rdA:true,a1:"",a2:"→",msg:'Redis에 세션을 HASH 타입으로 저장. TTL은 EXPIRE로 관리.<div class="msg-code">HMSET spring:session:sessions:abc123\n  sessionAttr:user "혁순"\n  sessionAttr:role "ADMIN"\n  maxInactiveInterval 1800\nEXPIRE spring:session:sessions:abc123 1800</div>'},
{cC:"Set-Cookie:\nSESSION=abc123",cA:true,sC:"",sA:false,rC:"stored",rA:false,rd:[{k:"spring:session:sessions:abc123",v:""},{k:"sessionAttr:user",v:'"혁순"'},{k:"sessionAttr:role",v:'"ADMIN"'}],rdA:false,a1:"←",a2:"",msg:'응답에 Set-Cookie로 세션 ID 전달. 쿠키 이름은 SESSION (JSESSIONID가 아님).<div class="msg-code">CookieSerializer:\n  cookieName: "SESSION"\n  httpOnly: true\n  secure: true\n  sameSite: "Lax"</div>'},
{cC:"GET /dashboard\nCookie: SESSION=abc123",cA:true,sC:"findById(abc123)",sA:true,rC:"HGETALL\nabc123",rA:true,rd:[{k:"spring:session:sessions:abc123",v:""},{k:"sessionAttr:user",v:'"혁순"'},{k:"lastAccessedTime",v:"갱신됨 ↻"}],rdA:true,a1:"→",a2:"→",msg:'이후 요청: SessionRepositoryFilter가 쿠키에서 세션 ID 추출 → Redis HGETALL → lastAccessedTime 갱신 + EXPIRE 연장. 어느 Pod로 가든 같은 Redis를 보니까 동일한 결과.<div class="msg-code">1. Cookie에서 SESSION=abc123 추출\n2. redisSessionRepository.findById("abc123")\n3. Redis: HGETALL spring:session:sessions:abc123\n4. lastAccessedTime 갱신 + EXPIRE 연장</div>'},
{cC:"POST /logout",cA:true,sC:"session.invalidate()\n→ Redis DEL",sA:true,rC:"DEL abc123",rA:true,rd:[{k:"(deleted)",v:""}],rdA:false,a1:"→",a2:"→",msg:'로그아웃: session.invalidate() → Redis에서 키 삭제 + 브라우저 쿠키 Max-Age=0.<div class="msg-code">DEL spring:session:sessions:abc123\n\n// 타임아웃: Redis EXPIRE가 자동 처리\n// 서버가 별도로 정리할 필요 없음</div>'}
];
let c=0;
function r(){const s=R[c];document.getElementById('ar-c').className='abox'+(s.cA?' active':'');document.getElementById('arCC').innerHTML=s.cC.replace(/\n/g,'<br>');document.getElementById('ar-s').className='abox'+(s.sA?' active':'');document.getElementById('arSC').innerHTML=s.sC.replace(/\n/g,'<br>');document.getElementById('ar-r').className='abox'+(s.rA?' active2':'');document.getElementById('arRC').innerHTML=s.rC.replace(/\n/g,'<br>');document.getElementById('a1').innerHTML=s.a1||'&middot;';document.getElementById('a2').innerHTML=s.a2||'&middot;';document.getElementById('rdBox').className='redis-data'+(s.rdA?' active':'');document.getElementById('rdRows').innerHTML=s.rd.length?s.rd.map((r,i)=>i===0?`<div style="font-size:11px;font-family:monospace;font-weight:600;margin:0 0 6px">${r.k}</div>`:`<div class="rd-row"><div class="rd-key">${r.k}</div><div class="rd-val">${r.v}</div></div>`).join(''):'<div style="color:#999;font-style:italic;font-size:11px">(empty)</div>';document.getElementById('msgA').innerHTML=`<div class="msg-desc">${s.msg}</div>`;document.getElementById('pills').innerHTML=R.map((_,i)=>`<div class="pill ${i<c?'done':i===c?'cur':''}" onclick="gt(${i})">${i+1}</div>`).join('');document.getElementById('pb').disabled=c===0;document.getElementById('nb').disabled=c===R.length-1;}
function g(d){c=Math.max(0,Math.min(R.length-1,c+d));r();}function gt(i){c=i;r();}r();
</script></body></html>

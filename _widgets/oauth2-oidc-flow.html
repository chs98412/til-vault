<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>OAuth2 + OIDC Flow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:720px;margin:0 auto;padding:20px;color:#1a1a1a;background:#fff}h2{font-size:18px;font-weight:600;margin:0 0 16px}.tabs{display:flex;gap:0;margin:0 0 16px;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}.tab{flex:1;padding:10px 8px;font-size:12px;text-align:center;cursor:pointer;background:#fff;color:#666;border:none}.tab.active{font-weight:600}.tab.t0.active{background:#EEEDFE;color:#3C3489}.tab.t1.active{background:#E1F5EE;color:#085041}.actors{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin:0 0 14px}.actor{border:1px solid #e5e5e5;border-radius:12px;padding:10px;min-height:90px;transition:all .3s}.actor.ac{border-color:#185FA5;background:#E6F1FB}.actor-name{font-size:12px;font-weight:600;margin:0 0 2px}.actor-role{font-size:10px;color:#666;margin:0 0 6px}.actor-data{font-size:10px;font-family:monospace;color:#666;line-height:1.5;white-space:pre-wrap}.badges{display:flex;gap:6px;margin:0 0 12px;flex-wrap:wrap}.badge{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600}.b-o{background:#EEEDFE;color:#3C3489}.b-i{background:#E1F5EE;color:#085041}.b-p{background:#FAEEDA;color:#633806}.msg-area{border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin:0 0 14px;min-height:70px}.msg-desc{font-size:13px;line-height:1.7;color:#555}.msg-desc b{font-weight:600}.msg-code{font-family:monospace;font-size:11px;background:#f5f5f5;padding:6px 10px;border-radius:6px;margin:6px 0;display:block;line-height:1.5;white-space:pre-wrap;word-break:break-all}.msg-why{font-size:12px;padding:8px 12px;border-left:3px solid #534AB7;background:#f9f9f9;margin:8px 0;color:#666;line-height:1.6;border-radius:0}.controls{display:flex;align-items:center;gap:12px}.step-pills{display:flex;gap:5px;flex:1;flex-wrap:wrap}.pill{width:24px;height:24px;border-radius:50%;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;cursor:pointer;background:#fff}.pill.pp{background:#EEEDFE;color:#3C3489;border-color:#534AB7}.pill.pg{background:#E1F5EE;color:#085041;border-color:#0F6E56}.pill.cur{font-weight:700}button{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px}button:disabled{opacity:.3}
</style></head><body>
<h2>OAuth2 Authorization Code Flow + OIDC</h2>
<div class="tabs"><div class="tab t0 active" onclick="sw(0)">OAuth2 Auth Code Flow</div><div class="tab t1" onclick="sw(1)">OIDC additions</div></div>
<div class="badges" id="badges"></div>
<div class="actors" id="actors"></div>
<div class="msg-area" id="msg"></div>
<div class="controls"><div class="step-pills" id="pills"></div><button id="pb" onclick="g(-1)">Prev</button><button id="nb" onclick="g(1)">Next</button></div>
<script>
const OA=[[['b-o OAuth2'],[["ac","User","Resource Owner",""],["ac","Print App","Client","client_id: print123\nclient_secret: s3cr3t"],["","Google","Auth Server","accounts.google.com"],["","Google Photos","Resource Server","photos.googleapis.com"]],'OAuth2의 4가지 주체. <b>Resource Owner</b>(사용자), <b>Client</b>(사진 인쇄 앱), <b>Authorization Server</b>(Google), <b>Resource Server</b>(Google Photos API).','pp'],[['b-o OAuth2','b-p +PKCE'],[["ac","User","","구글 사진 연동 클릭"],["ac","Print App","Client","code_verifier = random()\ncode_challenge = SHA256(v)"],["","Google","Auth Server",""],["","Google Photos","",""]],'Client가 PKCE용 code_verifier를 생성하고 SHA256 해시인 code_challenge를 만듦.<div class="msg-why"><b>PKCE</b>: authorization code가 탈취되어도 code_verifier를 모르면 토큰 발급 불가.</div>','pp'],[['b-o OAuth2'],[["","User","","브라우저가 Google로 리다이렉트"],["ac","Print App","","302 Redirect →"],["ac","Google","Auth Server","로그인 + 동의 화면"],["","","",""]],'Client가 사용자를 Google Auth Server로 리다이렉트.<div class="msg-code">GET accounts.google.com/authorize?\n  response_type=code\n  &client_id=print123\n  &redirect_uri=print.com/callback\n  &scope=photos.readonly\n  &code_challenge=HASH&state=xyz</div><div class="msg-why"><b>scope=photos.readonly</b>: 사진 읽기만 요청. Gmail이나 Drive에는 접근 불가.</div>','pp'],[['b-o OAuth2'],[["ac","User","","\"허용\" 클릭"],["","Print App","","대기 중..."],["ac","Google","Auth Server","로그인 확인 + 동의"],["","","",""]],'사용자가 Google에 <b>직접</b> 로그인. Print App은 비밀번호를 절대 보지 못함. 이게 OAuth가 해결한 근본 문제.','pp'],[['b-o OAuth2'],[["","User","",""],["ac","Print App","Client","code=AUTH_CODE\nstate=xyz ✓"],["ac","Google","Auth Server","302 → callback?code=AUTH_CODE"],["","","",""]],'동의 후 Google이 authorization code를 URL 파라미터로 전달.<div class="msg-why"><b>왜 token 대신 code?</b> URL은 브라우저 히스토리, 로그, Referer에 노출 가능. access token을 직접 URL에 넣으면 위험.</div>','pp'],[['b-o OAuth2','b-p PKCE'],[["","User","",""],["ac","Print App","Server","POST /token\ncode + secret + verifier"],["ac","Google","Auth Server","code ✓\nsecret ✓\nSHA256(verifier)==challenge ✓"],["","","",""]],'서버 간 백채널에서 토큰 교환. 브라우저를 거치지 않음.<div class="msg-why"><b>client_secret</b>: 앱이 진짜 Print App인지 인증<br><b>code_verifier</b>: PKCE 검증으로 code 탈취 방어</div>','pp'],[['b-o OAuth2'],[["ac","User","","사진 보이는 중..."],["ac","Print App","Client","Authorization:\nBearer eyJ..."],["","Google","",""],["ac","Google Photos","Resource Server","토큰 검증 ✓\nscope: photos.readonly ✓"]],'access token으로 Google Photos API 호출. OAuth2의 범위는 여기까지 — "사진 접근 권한"만 얻음, 사용자가 누구인지는 모름.','pp']];
const OI=[[['b-o OAuth2','b-i +OIDC'],[["","User","",""],["ac","service-a.com","Client (RP)","Keycloak에 등록된 클라이언트"],["ac","Keycloak","Auth Server (OP)","OpenID Provider"],["","","",""]],'OIDC는 OAuth2 위에 <b>인증 레이어</b>를 얹은 것. 차이점 두 가지: scope에 "openid" 추가, 응답에 ID token 포함.','pg'],[['b-i scope: openid'],[["","User","",""],["ac","service-a.com","RP","302 Redirect →"],["ac","Keycloak","OP",""],["","","",""]],'<div class="msg-code">GET keycloak.company.com/authorize?\n  scope=openid profile email ← openid!\n  &response_type=code\n  &client_id=service-a\n  &redirect_uri=service-a.com/callback</div><div class="msg-why"><b>scope=openid</b>: 이게 있어야 OIDC. 없으면 순수 OAuth2.</div>','pg'],[['b-i ID token 추가!'],[["","User","",""],["ac","service-a.com","RP",'access_token: eyJ...\nid_token: eyJ...(JWT!)\nrefresh_token: rf_...'],["ac","Keycloak","OP","토큰 발급:\naccess + id + refresh"],["","","",""]],'토큰 응답에 <b>ID token</b>이 추가됨!<div class="msg-code">{\n  "access_token": "eyJ...",\n  "id_token": "eyJ...JWT...",  ← OIDC!\n  "refresh_token": "rf_..."\n}</div>','pg'],[['b-i ID token 구조'],[["","User","",""],["ac","service-a.com","RP","ID token 디코딩 중..."],["","Keycloak","",""],["","","",""]],'ID token은 JWT. 사용자 정보가 들어있음:<div class="msg-code">{\n  "iss": "https://keycloak.company.com",\n  "sub": "user-uuid-1234",\n  "name": "혁순",\n  "email": "hs@company.com"\n}</div><div class="msg-why"><b>access token</b> = API 접근 권한 (인가)<br><b>id token</b> = 사용자 식별 (인증). API 호출에 사용하면 안 됨!</div>','pg'],[['b-i OIDC','b-o OAuth2'],[["ac","User","","로그인 완료!"],["ac","service-a.com","RP","id_token → 사용자: 혁순\n→ 자체 세션 쿠키 발급\nSet-Cookie: SVC_SESSION=xyz"],["","Keycloak","",""],["","","",""]],'service-a.com이 id_token으로 사용자를 식별하고 <b>자기 도메인에 자체 세션 쿠키를 발급</b>. 이후 Keycloak 없이 독립 동작.<div class="msg-why"><b>인증</b>: ID token → "이 사람은 혁순"\n<b>인가</b>: access token → "혁순은 backoffice.admin scope"\n\nKeycloak이 둘 다 처리하고, 각 서비스는 독립적인 세션으로 동작.</div>','pg']];
const ALL=[OA,OI];
let sc=0,c=0;
function sw(s){sc=s;c=0;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===s));r();}
function r(){const steps=ALL[sc],s=steps[c];const[badges,actors,msg,pc]=s;document.getElementById('badges').innerHTML=badges.map(b=>{const[cls,...t]=b.split(' ');return`<span class="badge ${cls}">${t.join(' ')}</span>`}).join('');document.getElementById('actors').innerHTML=actors.map(([cls,name,role,data])=>name?`<div class="actor${cls?' '+cls:''}">${name?`<div class="actor-name">${name}</div>`:''}${role?`<div class="actor-role">${role}</div>`:''}${data?`<div class="actor-data">${data}</div>`:''}</div>`:'<div></div>').join('');document.getElementById('msg').innerHTML=`<div class="msg-desc">${msg}</div>`;document.getElementById('pills').innerHTML=steps.map((_,i)=>`<div class="pill ${i<=c?pc:''} ${i===c?'cur':''}" onclick="gt(${i})">${i+1}</div>`).join('');document.getElementById('pb').disabled=c===0;document.getElementById('nb').disabled=c===steps.length-1;}
function g(d){c=Math.max(0,Math.min(ALL[sc].length-1,c+d));r();}function gt(i){c=i;r();}r();
</script></body></html>

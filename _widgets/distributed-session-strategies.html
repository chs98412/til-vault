<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distributed Session Strategies</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:720px;margin:0 auto;padding:20px;color:#1a1a1a;background:#fff}
h2{font-size:18px;font-weight:600;margin:0 0 16px}
.tabs{display:flex;gap:0;margin:0 0 16px;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}
.tab{flex:1;padding:10px 6px;font-size:11px;text-align:center;cursor:pointer;background:#fff;color:#666;border:none;transition:all .2s}
.tab.active{font-weight:600}
.tab.t0.active{background:#FCEBEB;color:#791F1F}
.tab.t1.active{background:#FAEEDA;color:#633806}
.tab.t2.active{background:#E6F1FB;color:#0C447C}
.tab.t3.active{background:#E1F5EE;color:#085041}
.infra{display:grid;grid-template-columns:80px 1fr 100px;gap:10px;margin:0 0 14px}
.lb{border:1px solid #e5e5e5;border-radius:12px;padding:10px;text-align:center}
.lb-title{font-size:11px;font-weight:600;margin:0 0 4px}
.lb-algo{font-size:10px;font-family:monospace;color:#666}
.pods{display:flex;flex-direction:column;gap:6px}
.pod{border:1px solid #e5e5e5;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;transition:all .3s;font-size:12px}
.pod.hit{border-color:#185FA5;background:#E6F1FB}
.pod.miss{border-color:#A32D2D;background:#FCEBEB}
.pod.dead{opacity:.3;text-decoration:line-through}
.pod-name{font-weight:600;min-width:50px;font-size:11px}
.pod-session{font-family:monospace;font-size:10px;color:#666;flex:1}
.ext-store{border:1px solid #e5e5e5;border-radius:12px;padding:10px;text-align:center}
.ext-store.active{border-color:#185FA5;background:#E6F1FB}
.ext-title{font-size:11px;font-weight:600;margin:0 0 4px}
.ext-data{font-size:10px;font-family:monospace;color:#666}
.msg-area{border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin:0 0 14px;min-height:60px}
.msg-desc{font-size:13px;line-height:1.7;color:#555}
.msg-desc.danger{color:#A32D2D;font-weight:500}
.msg-desc.warn{color:#854F0B;font-weight:500}
.msg-desc.safe{color:#085041;font-weight:500}
.controls{display:flex;align-items:center;gap:12px}
.step-pills{display:flex;gap:6px;flex:1;flex-wrap:wrap}
.pill{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#999;cursor:pointer;background:#fff}
.pill.pr{background:#FCEBEB;color:#791F1F;border-color:#A32D2D}
.pill.pa{background:#FAEEDA;color:#633806;border-color:#BA7517}
.pill.pb{background:#E6F1FB;color:#0C447C;border-color:#185FA5}
.pill.pg{background:#E1F5EE;color:#085041;border-color:#0F6E56}
.pill.cur{font-weight:700}
button{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px}
button:hover{background:#f5f5f5}
button:disabled{opacity:.3}
</style>
</head>
<body>
<h2>Distributed Session Strategies</h2>
<div class="tabs">
<div class="tab t0 active" onclick="sw(0)">No strategy</div>
<div class="tab t1" onclick="sw(1)">Sticky session</div>
<div class="tab t2" onclick="sw(2)">Session clustering</div>
<div class="tab t3" onclick="sw(3)">Redis store</div>
</div>
<div class="infra">
<div class="lb"><div class="lb-title">Load balancer</div><div class="lb-algo" id="lbA"></div></div>
<div class="pods" id="pods"></div>
<div id="ext"></div>
</div>
<div class="msg-area" id="msg"></div>
<div class="controls"><div class="step-pills" id="pills"></div><button id="pbtn" onclick="g(-1)">Prev</button><button id="nbtn" onclick="g(1)">Next</button></div>
<script>
const D=[[{lb:"round-robin",pods:[{n:"Pod-1",s:"(empty)",c:""},{n:"Pod-2",s:"(empty)",c:""},{n:"Pod-3",s:"(empty)",c:""}],ext:"",ea:false,msg:"3대의 Pod가 로드밸런서 뒤에 있습니다.",mc:"",pc:"pr"},{lb:"round-robin",pods:[{n:"Pod-1",s:"SESSION=abc {혁순}",c:"hit"},{n:"Pod-2",s:"(empty)",c:""},{n:"Pod-3",s:"(empty)",c:""}],ext:"",ea:false,msg:"첫 요청이 Pod-1로. 로그인 성공, Pod-1 메모리에 세션 저장.",mc:"",pc:"pr"},{lb:"round-robin",pods:[{n:"Pod-1",s:"SESSION=abc {혁순}",c:""},{n:"Pod-2",s:"SESSION=abc ???",c:"miss"},{n:"Pod-3",s:"(empty)",c:""}],ext:"",ea:false,msg:"두 번째 요청이 Pod-2로. 세션 없음! 로그인이 풀림.",mc:"danger",pc:"pr"},{lb:"round-robin",pods:[{n:"Pod-1",s:"SESSION=abc {혁순}",c:""},{n:"Pod-2",s:"(empty)",c:""},{n:"Pod-3",s:"SESSION=abc ???",c:"miss"}],ext:"",ea:false,msg:"세 번째 요청이 Pod-3으로. 또 없음! 3번 중 1번만 정상.",mc:"danger",pc:"pr"}],[{lb:"sticky (cookie)",pods:[{n:"Pod-1",s:"(empty)",c:""},{n:"Pod-2",s:"(empty)",c:""},{n:"Pod-3",s:"(empty)",c:""}],ext:"",ea:false,msg:"LB가 사용자를 특정 Pod에 고정합니다.",mc:"",pc:"pa"},{lb:"sticky→Pod-1",pods:[{n:"Pod-1",s:"SESSION=abc {혁순}",c:"hit"},{n:"Pod-2",s:"(empty)",c:""},{n:"Pod-3",s:"(empty)",c:""}],ext:"",ea:false,msg:"첫 요청이 Pod-1로. LB가 '이 사용자=Pod-1' 매핑 기억.",mc:"",pc:"pa"},{lb:"sticky→Pod-1",pods:[{n:"Pod-1",s:"SESSION=abc {혁순}",c:"hit"},{n:"Pod-2",s:"(empty)",c:""},{n:"Pod-3",s:"(empty)",c:""}],ext:"",ea:false,msg:"이후 요청도 Pod-1로. 계속 정상 동작.",mc:"",pc:"pa"},{lb:"sticky→Pod-1",pods:[{n:"Pod-1",s:"(dead)",c:"dead"},{n:"Pod-2",s:"(empty)",c:"miss"},{n:"Pod-3",s:"(empty)",c:""}],ext:"",ea:false,msg:"Pod-1 장애! 세션 유실. 트래픽 불균형 문제도 있음.",mc:"warn",pc:"pa"}],[{lb:"round-robin",pods:[{n:"Pod-1",s:"(empty)",c:""},{n:"Pod-2",s:"(empty)",c:""},{n:"Pod-3",s:"(empty)",c:""}],ext:"cluster sync",ea:false,msg:"Pod끼리 세션을 복제합니다. Tomcat DeltaManager.",mc:"",pc:"pb"},{lb:"round-robin",pods:[{n:"Pod-1",s:"SESSION=abc",c:"hit"},{n:"Pod-2",s:"(syncing...)",c:""},{n:"Pod-3",s:"(syncing...)",c:""}],ext:"replicating...",ea:true,msg:"Pod-1에서 로그인. 다른 Pod들에게 복제 전송.",mc:"",pc:"pb"},{lb:"round-robin",pods:[{n:"Pod-1",s:"SESSION=abc",c:""},{n:"Pod-2",s:"SESSION=abc",c:"hit"},{n:"Pod-3",s:"SESSION=abc",c:""}],ext:"synced",ea:false,msg:"복제 완료. 어느 Pod로 가든 세션 있음!",mc:"",pc:"pb"},{lb:"round-robin",pods:[{n:"Pod-1",s:"abc,def,ghi...",c:""},{n:"Pod-2",s:"abc,def,ghi...",c:""},{n:"Pod-3",s:"abc,def,ghi...",c:""}],ext:"N×N sync",ea:true,msg:"한계: 모든 Pod가 모든 세션을 메모리에 보유. Pod 수×세션 수로 폭발. 소규모만 가능.",mc:"warn",pc:"pb"}],[{lb:"round-robin",pods:[{n:"Pod-1",s:"(stateless)",c:""},{n:"Pod-2",s:"(stateless)",c:""},{n:"Pod-3",s:"(stateless)",c:""}],ext:"Redis\n(empty)",ea:false,msg:"Pod는 세션을 메모리에 안 들고, Redis가 세션 저장소.",mc:"",pc:"pg"},{lb:"round-robin",pods:[{n:"Pod-1",s:"→ Redis write",c:"hit"},{n:"Pod-2",s:"(stateless)",c:""},{n:"Pod-3",s:"(stateless)",c:""}],ext:"Redis\nSESSION=abc {혁순}",ea:true,msg:"Pod-1에서 로그인. 세션을 Redis에 저장.",mc:"",pc:"pg"},{lb:"round-robin",pods:[{n:"Pod-1",s:"(stateless)",c:""},{n:"Pod-2",s:"→ Redis read ✓",c:"hit"},{n:"Pod-3",s:"(stateless)",c:""}],ext:"Redis\nSESSION=abc {혁순}",ea:true,msg:"두 번째 요청이 Pod-2로. Redis에서 세션 조회 → 있음! 정상.",mc:"safe",pc:"pg"},{lb:"round-robin",pods:[{n:"Pod-1",s:"(dead)",c:"dead"},{n:"Pod-2",s:"(stateless)",c:""},{n:"Pod-3",s:"→ Redis read ✓",c:"hit"}],ext:"Redis\nSESSION=abc {혁순}",ea:true,msg:"Pod-1이 죽어도 세션은 Redis에 있으니 안전! K8s에 최적.",mc:"safe",pc:"pg"}]];
let sc=0,c=0;
function sw(s){sc=s;c=0;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===s));r();}
function r(){const steps=D[sc],s=steps[c];document.getElementById('lbA').textContent=s.lb;document.getElementById('pods').innerHTML=s.pods.map(p=>`<div class="pod ${p.c}"><span class="pod-name">${p.n}</span><span class="pod-session">${p.s}</span></div>`).join('');document.getElementById('ext').innerHTML=s.ext?`<div class="ext-store${s.ea?' active':''}"><div class="ext-title">External store</div><div class="ext-data">${s.ext.replace(/\n/g,'<br>')}</div></div>`:'';document.getElementById('msg').innerHTML=`<div class="msg-desc ${s.mc}">${s.msg}</div>`;document.getElementById('pills').innerHTML=steps.map((_,i)=>`<div class="pill ${i<=c?s.pc:''} ${i===c?'cur':''}" onclick="gt(${i})">${i+1}</div>`).join('');document.getElementById('pbtn').disabled=c===0;document.getElementById('nbtn').disabled=c===steps.length-1;}
function g(d){const steps=D[sc];c=Math.max(0,Math.min(steps.length-1,c+d));r();}
function gt(i){c=i;r();}
r();
</script>
</body>
</html>
